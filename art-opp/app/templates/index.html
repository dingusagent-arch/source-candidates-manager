<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ART-OPP Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
      table { border-collapse: collapse; width: 100%; margin-top: 12px; }
      th, td { border: 1px solid #ddd; padding: 8px; }
      th { background: #f5f5f5; text-align: left; }
      tr:hover { background: #fafafa; cursor: pointer; }
      #detail { margin-top: 16px; padding: 12px; border: 1px solid #ddd; }
      .btn { padding: 6px 10px; border: 1px solid #bbb; background: #fff; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>ART-OPP Dashboard</h1>

    <div class="row">
      <label>Status
        <select id="status">
          <option value="">all</option>
          <option value="new">new</option>
          <option value="approved">approved</option>
          <option value="rejected">rejected</option>
          <option value="skipped">skipped</option>
        </select>
      </label>
      <label>Min score <input id="min_score" type="number" step="1" /></label>
      <label>Search <input id="search" type="text" /></label>
      <button class="btn" id="refresh">Refresh</button>
    </div>

    <div class="row">
      <input id="csv_file" type="file" accept=".csv" />
      <button class="btn" id="import_btn">Import CSV</button>
      <span id="import_result"></span>
    </div>

    <table>
      <thead>
        <tr>
          <th>Title</th><th>City</th><th>Discipline</th><th>Status</th><th>Score</th>
        </tr>
      </thead>
      <tbody id="items"></tbody>
    </table>

    <div id="detail">
      <h3>Detail</h3>
      <pre id="detail_json">Select a row…</pre>
      <div class="row">
        <button class="btn" data-action="approve">Approve</button>
        <button class="btn" data-action="reject">Reject</button>
        <button class="btn" data-action="skip">Skip</button>
        <input id="triage_note" type="text" placeholder="optional note" />
      </div>
    </div>

    <script src="/static/main.js"></script>
  </body>
</html>
